version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: supermercado_mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-file=/docker-entrypoint-initdb.d/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: senha123
      MYSQL_DATABASE: supermercado_db
      MYSQL_USER: usuario
      MYSQL_PASSWORD: senha123
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/my.cnf:/etc/mysql/conf.d/my.cnf
      - mysql_data:/var/lib/mysql
    networks:
      - supermercado_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: supermercado_app
    ports:
      - "8501:8501"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: usuario
      DB_PASSWORD: senha123
      DB_NAME: supermercado_db
    networks:
      - supermercado_network
    volumes:
      - ./app:/app

volumes:
  mysql_data:

networks:
  supermercado_network:
    driver: bridge